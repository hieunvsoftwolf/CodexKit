interface:
  display_name: "Control Agent"
  short_description: "Phase orchestration and verification gating"
  default_prompt: >
    Use $control-agent to first read README.md, docs/non-functional-requirements.md,
    docs/verification-policy.md, docs/prompt-cookbook-codexkit-phase-guide.md,
    docs/project-overview-pdr.md, docs/system-architecture.md, and docs/project-roadmap.md.
    Then inspect the current CodexKit phase, decide whether the high-rigor verification model
    applies, pin a reproducible BASE_SHA when needed, route implement plus spec-test-design in
    parallel when allowed, keep final test and verdict dependency-correct, recommend the model for
    each session, and generate the exact prompts plus paste-back artifacts while preserving the
    existing control-agent output contract.

policy:
  allow_implicit_invocation: false
