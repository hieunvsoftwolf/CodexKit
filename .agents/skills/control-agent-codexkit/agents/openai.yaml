interface:
  display_name: "CodexKit Control Agent"
  short_description: "Plan-aware phase orchestration and verification gating for CodexKit"
  default_prompt: >
    Use $control-agent-codexkit to first read README.md, plans/20260404-2140-runtime-stabilization-and-full-runtime-suite-remediation/plan.md, plans/20260404-2140-runtime-stabilization-and-full-runtime-suite-remediation/phase-01-archive-confirmation-contract-alignment.md, docs/control-agent/control-agent-codexkit/verification-policy.md, docs/control-agent/control-agent-codexkit/phase-guide.md, docs/control-agent/control-agent-codexkit/plan-contract.md, docs/control-agent/control-agent-codexkit/skill-inventory.md, docs/project-overview-pdr.md, docs/system-architecture.md, docs/project-roadmap.md, docs/non-functional-requirements.md,
    and the latest durable control-state report when one exists under plans/20260404-2140-runtime-stabilization-and-full-runtime-suite-remediation/reports.
    Then inspect the current plan phase, decide whether a runnable baseline-disposition prep
    session is needed, whether a worktree-creation prep step is required, whether preflight or
    freeze is needed, whether planner-first sequencing or the default high-rigor wave applies,
    and enforce that code-changing Session A runs in a brand-new dedicated execution worktree
    while root main stays read-only control surface. Require Session B0 to declare verification-owned
    tests, fixtures, harnesses, snapshots, and golden artifacts plus whether Session A may touch them.
    Require Session B tester artifacts to include exact commands, execution surface, exit status, and raw
    evidence references, and require Session D / lead verdict to inspect those raw references, own merge
    closure, and require post-merge durable control-state plus execution worktree cleanup/archive before
    operational closure, while preserving the generated output contract.

policy:
  allow_implicit_invocation: false
